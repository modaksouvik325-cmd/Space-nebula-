<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Cosmic Nebula</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #webgl-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* Updated: Show camera in the corner for easy debugging */
        #video-feed {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            transform: scaleX(-1); /* Mirror the preview to match real life */
            background: #111;
            object-fit: cover;
            z-index: 10;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">INITIALIZING NEBULA & CAMERA...</div>
    <video id="video-feed" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        // ==========================================
        // 1. THREE.JS SETUP
        // ==========================================
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        // ==========================================
        // 2. VOLUMETRIC PARTICLE SYSTEM
        // ==========================================
        const PARTICLE_COUNT = 100000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const randoms = new Float32Array(PARTICLE_COUNT);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        const color1 = new THREE.Color("#00ffcc"); 
        const color2 = new THREE.Color("#ff00ff"); 

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const radius = Math.pow(Math.random(), 3) * 10; 
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);

            randoms[i] = Math.random();

            const mixedColor = color1.clone().lerp(color2, radius / 10 + Math.random() * 0.2);
            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
        geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0.0 },
                uHandPos: { value: new THREE.Vector3(0, 0, 0) },
                uHandActive: { value: 0.0 }
            },
            vertexShader: `
                uniform float uTime;
                uniform vec3 uHandPos;
                uniform float uHandActive;
                
                attribute float aRandom;
                attribute vec3 aColor;
                
                varying vec3 vColor;

                void main() {
                    vColor = aColor;
                    vec3 pos = position;

                    float angle = uTime * 0.2 + aRandom * 6.28;
                    float distFromCenter = length(pos.xy);
                    pos.x += cos(angle) * 0.02 * distFromCenter;
                    pos.y += sin(angle) * 0.02 * distFromCenter;

                    // Hand Repulsion Force
                    if (uHandActive > 0.5) {
                        float distToHand = distance(pos, uHandPos);
                        float influenceRadius = 5.0; // Slightly increased for a bigger hit-box
                        
                        if (distToHand < influenceRadius) {
                            vec3 dir = normalize(pos - uHandPos);
                            float force = pow((influenceRadius - distToHand) / influenceRadius, 2.0);
                            pos += dir * force * 3.0; 
                        }
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = (25.0 / -mvPosition.z) * (0.5 + aRandom * 0.5);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;

                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    if (dist > 0.5) discard;
                    
                    float alpha = smoothstep(0.5, 0.1, dist);
                    gl_FragColor = vec4(vColor, alpha * 0.7);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // ==========================================
        // 3. MEDIAPIPE HAND TRACKING
        // ==========================================
        const videoElement = document.getElementById('video-feed');
        const loadingElement = document.getElementById('loading');
        
        let handTargetPosition = new THREE.Vector3();
        let currentHandPosition = new THREE.Vector3();

        function onResults(results) {
            if (loadingElement) loadingElement.style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                material.uniforms.uHandActive.value = 1.0;
                
                // Landmark 9 is the middle finger MCP (center of the palm), which is more stable than a fingertip
                const landmark = results.multiHandLandmarks[0][9]; 
                
                // Map MediaPipe (0 to 1) to Three.js Screen Space (-1 to 1)
                const ndcX = -(landmark.x * 2 - 1);
                const ndcY = -(landmark.y * 2 - 1);

                // Project into 3D space
                const vector = new THREE.Vector3(ndcX, ndcY, 0.5);
                vector.unproject(camera);
                
                const dir = vector.sub(camera.position).normalize();
                const distance = -camera.position.z / dir.z;
                
                handTargetPosition.copy(camera.position).add(dir.multiplyScalar(distance));
            } else {
                // Smoothly decay tracking if hand leaves frame
                material.uniforms.uHandActive.value = Math.max(0.0, material.uniforms.uHandActive.value - 0.05);
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5, // Slightly lowered for faster initial tracking
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraFeed.start().catch(err => {
            console.error("Camera failed to start:", err);
            document.getElementById('loading').innerText = "CAMERA ERROR: Please allow camera permissions.";
        });

        // ==========================================
        // 4. ANIMATION LOOP & RESIZING
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Lerp tracking for fluid movement
            currentHandPosition.lerp(handTargetPosition, 0.15);
            material.uniforms.uHandPos.value.copy(currentHandPosition);
            
            material.uniforms.uTime.value = clock.getElapsedTime();

            particles.rotation.y += 0.0008;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
